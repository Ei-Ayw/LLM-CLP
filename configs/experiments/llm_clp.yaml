# LLM-CLP experiment configuration
method: llm_clp
model:
  name: microsoft/deberta-v3-base
  hidden_size: 768
  num_labels: 2

training:
  epochs: 5
  batch_size: 16
  gradient_accumulation_steps: 1
  learning_rate: 2e-5
  weight_decay: 0.01
  warmup_ratio: 0.1
  max_grad_norm: 1.0
  fp16: true

# LLM-CLP specific losses
losses:
  lambda_clp: 1.0       # Counterfactual Logit Pairing weight
  lambda_con: 0.5       # Supervised Contrastive loss weight
  temperature: 0.07     # Contrastive temperature
  projection_dim: 256   # Projector hidden dim
  embedding_dim: 128    # Projector output dim

seed: 42

# Counterfactual generation
cf:
  backend: zhipu  # zhipu | openai | qwen | swap
  method: llm     # llm | swap
  temperature: 0.3
  max_retries: 3
